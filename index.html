<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Borked Contact - The World's Worst UI</title>
    <meta name="description"
        content="A contact form designed to be intentionally frustrating and delightfully broken for the Borked UI Jam.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Space+Mono&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="background-chaos"></div>

    <main class="container">
        <header>
            <h1 class="glitch" data-text="CONTACT US?">CONTACT US?</h1>
            <p class="subtitle">Good luck filling this out. You'll need it.</p>
        </header>

        <form id="borked-form">
            <input type="hidden" name="name" id="hidden-name">
            <input type="hidden" name="phone" id="hidden-phone">
            <input type="hidden" name="email" id="hidden-email">
            <input type="hidden" name="country" id="hidden-country">

            <div class="form-group" id="name-group">
                <label>What is your name?</label>
                <div class="input-wrapper">
                    <div id="name-display" class="borked-input placeholder">Click to start typing...</div>
                    <button type="button" class="action-btn" id="start-name">TYPE</button>
                </div>
            </div>

            <div class="form-group" id="phone-group">
                <label>Phone Number (Archery Required)</label>
                <div class="input-wrapper">
                    <div id="flag-display" class="borked-input"
                        style="flex-grow: 0; min-width: 50px; display: flex; justify-content: center; align-items: center; font-size: 1.5rem;">
                        🏳️</div>
                    <div id="phone-display" class="borked-input placeholder">Shoot your digits...</div>
                    <button type="button" class="action-btn" id="start-phone">AIM</button>
                </div>
            </div>

            <div class="form-group" id="email-group">
                <label>Email Address (Slot Machine)</label>
                <div class="input-wrapper">
                    <div id="email-display" class="borked-input placeholder">Spin for your email...</div>
                    <button type="button" class="action-btn" id="start-email">SPIN</button>
                </div>
            </div>

            <div class="form-group" id="message-group">
                <label>Your Message (Gravity Enabled)</label>
                <div class="message-container">
                    <textarea name="message" id="message-input" placeholder="Type here and watch it fall..."></textarea>
                    <div id="physics-canvas-container"></div>
                </div>
            </div>

            <div class="submit-container">
                <button type="submit" id="submit-btn">SUBMIT (IF YOU DARE)</button>
                <div id="fake-submit-1" class="fake-btn">SUBMIT</div>
                <div id="fake-submit-2" class="fake-btn">SUBMIT</div>
            </div>
        </form>
    </main>

    <div id="name-modal" class="modal">
        <div class="modal-content">
            <h2>CATCH THE LETTERS</h2>
            <p>Click the letters... if you can.</p>
            <div id="falling-letters-zone"></div>
            <div class="modal-footer">
                <div id="name-progress"></div>
                <button id="close-name" class="close-btn">I'M DONE</button>
            </div>
        </div>
    </div>

    <div id="phone-modal" class="modal">
        <div class="modal-content archery-content">
            <h2>ARCHERY & FLAG SELECT</h2>
            <div class="phone-games-container">
                <div class="flag-section">
                    <p>Select your flag emoji:</p>
                    <div id="flag-selector" class="flag-grid">
                    </div>
                </div>
                <div class="archery-game">
                    <div id="bow-container">
                        <div id="bow-wrapper">
                            <div class="css-bow"></div>
                            <div id="aim-line"></div>
                        </div>
                    </div>
                    <div id="target-zone">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <div id="phone-progress"></div>
                <div class="footer-btns">
                    <button id="backspace-phone" class="action-btn"
                        style="background: var(--accent); margin-right: 10px;">⌫</button>
                    <button id="close-phone" class="close-btn">DONE</button>
                </div>
            </div>
        </div>
    </div>

    <div id="email-modal" class="modal">
        <div class="modal-content">
            <h2>EMAIL SLOTS</h2>
            <div class="slot-machine-single">
                <div class="slot-window">
                    <div id="slot-strip-1" class="slot-strip"></div>
                </div>
            </div>
            <div class="slot-controls">
                <button id="stop-slot">SELECT LETTER</button>
                <button id="backspace-email">⌫</button>
            </div>
            <div class="quick-domains">
                <button type="button" class="domain-btn">@gmail.com</button>
                <button type="button" class="domain-btn">@hotmail.com</button>
                <button type="button" class="domain-btn">@yahoo.com</button>
                <button type="button" class="domain-btn">@outlook.com</button>
            </div>
            <div class="modal-footer">
                <div id="email-progress"></div>
                <button id="close-email" class="close-btn">DONE</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
